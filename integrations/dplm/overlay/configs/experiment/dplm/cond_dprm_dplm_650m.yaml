# @package _global_

defaults:
  - /datamodule: cath_4.3
  - /callbacks: fixedbb
  - /trainer: ddp_fp16

project: "anonymous-dprm-review"
name: "dprm_dplm_cond_650m_cath4.3"

datamodule:
  alphabet:
    name: esm
    featurizer: cath
    featurizer_cfg:
      coord_nan_to_zero: false

model:
  _target_: dplm_invfold
  decoder:
    num_diffusion_timesteps: 100
    adapter_dropout: 0.1
    dplm_name: airkingbd/dplm_650m
    encoder_d_model: ${model.encoder.d_model}
    order:
      enable: true
      train_order_policy: progressive_dprm
      decode_order_policy: dprm_soft_bon
      num_phases: 8
      confidence_bins: 16
      structure_bins: 4
      use_structure_bins: true
      contact_threshold: 10.0
      reward: aar
      reward_temperature: 8.0
      guidance_scale: 1.0
      warmup_steps: 20000
      switch_steps: 100000
      ready_count: 256
      sampled_soft_bon: true
      candidate_multiplier: 4
      min_candidates: 8
      max_candidates: 32
      confidence_threshold: 0.0
  encoder:
    _target_: gvp_trans_encoder
    output_logits: ${task.learning.output_encoder_logits}
    d_model: 512

  init_pred_where: true

task:
  _target_: lm/dplm_invfold
  alphabet: ${datamodule.alphabet}
  learning:
    noise: random_mask
    watch_t1_t2_loss: false
    cal_constant_loss: false
    weight: linear
    output_encoder_logits: true
  criterion:
    _target_: byprot.modules.cross_entropy.RDMCrossEntropyLoss
    label_smoothing: 0.0
    ignore_index: 1
  optimizer:
    type: adamw
    _partial_: true
    lr: ${train.lr}
    betas:
      - 0.9
      - 0.98
    weight_decay: 0.0001
  lr_scheduler:
    type: noam
    warmup_steps: 4000
    model_size: 128
    lr: ${train.lr}
    warmup_init_lr: 1e-07
  generator:
    max_iter: 10
    strategy: "discrete_diffusion"
    temperature: 1.0
    eval_plddt: False
    sampling_strategy: "argmax"
    use_draft_seq: true

train:
  seed: 42
  lr: 0.001
  monitor: "val/acc_median"
  mode: "max"

trainer:
  min_epochs: 10
  max_epochs: 10000
  gradient_clip_val: 0.0
  num_sanity_val_steps: 1
  reload_dataloaders_every_n_epochs: 1
  use_distributed_sampler: false
  max_steps: 200_000
  accumulate_grad_batches: 1
  check_val_every_n_epoch: 1
  val_check_interval: 1.0
  enable_progress_bar: true
