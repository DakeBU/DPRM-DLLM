model:
  vocab_size: 11
  hidden_size: 256
  intermediate_size: 768
  num_layers: 8
  num_attention_heads: 8
  num_kv_heads: 8
  max_position: 162
  rms_norm_eps: 1e-6
  dropout: 0.0

training:
  strategy: "progressive"
  order_policy: "dprm_soft_bon"
  confidence_threshold: 0.9
  mode: "confidence_collapse"
  K: 8
  data_ratio: 1.0
  learning_rate: 3e-4
  weight_decay: 0.01
  num_epochs: 2
  max_grad_norm: 1.0
  batch_size: 32
  warmup_steps: 1000
  logging_steps: 100
  eval_steps: 2000
  save_steps: 10000
  ema: 0.9999
  eos_id: null
  dprm:
    num_bins: 16
    reward_beta: 1.0
    value_scale: 1.0
    warmup_steps: 500
    switch_steps: 4000
    ready_count: 64
    sampled_shortlist: false
    candidate_multiplier: 4
    min_candidates: 8
    max_candidates: 64

validation:
  val_dir: "data/sudoku_new"
  ratio: 0.01
  sampling:
    temperature: 0.0
    confidence: ["top_k", "dprm_soft_bon"]
    unmasking_num: [1, 2, 3]
    dprm_num_phases: 8
    dprm_num_bins: 16
    dprm_reward_beta: 1.0
    dprm_lambda: 1.0
    dprm_warmup_steps: 0
    dprm_switch_steps: 16
    dprm_ready_count: 16

data:
  mask_id: 10
  dataset: "sudoku"
  data_dir: "data/sudoku_new"
  sudoku_type: "new"
  val_ratio: 0.05
  seed: 2026
  mmap: false
  training:
    per_gpu_batch_size: ${training.batch_size}
    cpus: 4

wandb:
  wandb: true
  project: "anonymous-dprm-review"
  name: "sudoku-puma-dprm"
  entity: "your-entity-here"
